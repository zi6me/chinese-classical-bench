name: leaderboard

on:
  push:
    branches: [main]
    paths:
      - "results/**"
      - "scripts/aggregate.py"
      - "scripts/scorers.py"
      - "scripts/validate_results.py"
  pull_request:
    paths:
      - "results/**"
      - "scripts/aggregate.py"
      - "scripts/scorers.py"
      - "scripts/validate_results.py"

permissions:
  contents: write

jobs:
  validate-and-aggregate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate results/*.json
        run: python scripts/validate_results.py

      - name: Regenerate leaderboard.md
        run: python scripts/aggregate.py --out leaderboard.md

      # On a PR: the contributor must have committed the regenerated leaderboard.
      - name: Check leaderboard.md is up to date (PR only)
        if: github.event_name == 'pull_request'
        run: |
          if ! git diff --quiet -- leaderboard.md; then
            echo "::error::leaderboard.md is out of date. Run 'python scripts/aggregate.py --out leaderboard.md' and commit it."
            git diff -- leaderboard.md
            exit 1
          fi
          echo "leaderboard.md is up to date."

      # On push to main: auto-commit the regenerated leaderboard if it changed.
      - name: Commit refreshed leaderboard.md (push to main only)
        if: github.event_name == 'push'
        run: |
          if git diff --quiet -- leaderboard.md; then
            echo "leaderboard.md unchanged."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add leaderboard.md
          git commit -m "chore: refresh leaderboard.md [skip ci]"
          git push
